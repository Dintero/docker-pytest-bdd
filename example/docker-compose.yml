services:
  httpstatus:
    image: python:3.11.15-alpine3.23
    working_dir: /example
    volumes:
      - .:/example
    command: python3 httpstatus.py

  end-to-end-tests:
    image: dintero/docker-pytest-bdd
    working_dir: /example
    volumes:
      - .:/example
    environment:
      - PYTEST_ADDOPTS=${PYTEST_ADDOPTS}
    depends_on:
      - httpstatus
    command: pytest
